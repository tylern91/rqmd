# target-cpu flags are intentionally omitted here because they change the
# build fingerprint for llama-cpp-sys (a C++ cmake crate) and trigger slow
# full rebuilds. Apply via RUSTFLAGS env var when building dist binaries:
#
#   RUSTFLAGS="-C target-cpu=native" cargo build --profile dist -p rqmd-cli

[target.x86_64-unknown-linux-musl]
# Linux static — MUSL libc; fully self-contained binary (no glibc dependency).
# Build: cargo build --release --target x86_64-unknown-linux-musl
rustflags = ["-C", "target-feature=+crt-static"]
